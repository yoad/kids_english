<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="English Fun">
    <title>משחק האנגלית של אלון ורומי</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
/* === Design Tokens === */
:root {
  --bg: #e8f4fd;
  --card: #ffffff;
  --shadow: rgba(0,0,0,0.1);
  --radius: 20px;
  --alon-primary: #4CAF50;
  --alon-secondary: #2196F3;
  --alon-gradient: linear-gradient(135deg, #4CAF50, #2196F3);
  --romi-primary: #E91E90;
  --romi-secondary: #9C27B0;
  --romi-gradient: linear-gradient(135deg, #FF69B4, #BA68C8);
  --correct: #27ae60;
  --wrong: #e74c3c;
  --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  --accent: var(--alon-primary);
  --gradient: var(--alon-gradient);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; width: 100%;
  font-family: var(--font);
  background: var(--bg);
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

body { direction: rtl; text-align: center; }

/* === Screens === */
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  min-height: 100vh;
  animation: fadeIn 0.4s ease;
}
.screen.active { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === Profile Selection Screen === */
#screen-profiles {
  justify-content: center;
  gap: 30px;
  background: linear-gradient(180deg, #e8f4fd 0%, #d4e9f7 100%);
}

.app-title {
  font-size: 36px;
  font-weight: 800;
  color: #333;
  margin-bottom: 10px;
}

.app-subtitle {
  font-size: 18px;
  color: #666;
  margin-bottom: 20px;
}

.profiles-container {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
}

.profile-card {
  width: 260px;
  padding: 30px 20px;
  border-radius: var(--radius);
  background: var(--card);
  box-shadow: 0 8px 30px var(--shadow);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  border: 4px solid transparent;
}
.profile-card:active {
  transform: scale(0.95);
}
.profile-card.alon-card:active,
.profile-card.alon-card:hover { border-color: var(--alon-primary); }
.profile-card.romi-card:active,
.profile-card.romi-card:hover { border-color: var(--romi-primary); }

.profile-emoji { font-size: 80px; margin-bottom: 10px; }
.profile-name { font-size: 28px; font-weight: 700; }
.profile-age { font-size: 16px; color: #888; margin-top: 5px; }
.profile-stars { font-size: 18px; margin-top: 10px; color: #f39c12; }

/* === Home Screen === */
#screen-home {
  gap: 20px;
  padding-top: 30px;
}

.home-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 600px;
  padding: 0 10px;
}

.home-profile-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.home-avatar { font-size: 50px; }
.home-name { font-size: 24px; font-weight: 700; }
.home-stars-count { font-size: 18px; color: #f39c12; }

.btn-back {
  font-size: 28px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
}

.progress-bar-container {
  width: 100%;
  max-width: 600px;
  background: #e0e0e0;
  border-radius: 12px;
  height: 20px;
  overflow: hidden;
  margin: 5px 0;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 12px;
  background: var(--gradient);
  transition: width 0.5s ease;
  min-width: 0;
}

.progress-text {
  font-size: 14px;
  color: #888;
}

.mode-cards {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 10px;
  width: 100%;
  max-width: 600px;
}

.mode-card {
  flex: 1;
  min-width: 200px;
  max-width: 280px;
  padding: 30px 20px;
  border-radius: var(--radius);
  background: var(--card);
  box-shadow: 0 6px 20px var(--shadow);
  cursor: pointer;
  transition: transform 0.2s;
  border: 3px solid transparent;
}
.mode-card:active { transform: scale(0.96); }

.mode-icon { font-size: 60px; margin-bottom: 10px; }
.mode-title { font-size: 22px; font-weight: 700; }
.mode-desc { font-size: 14px; color: #888; margin-top: 8px; }

/* === Category Selection === */
#screen-categories {
  gap: 15px;
  padding-top: 20px;
}

.categories-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 15px;
  width: 100%;
  max-width: 650px;
  padding: 10px;
}

.category-card {
  padding: 20px 10px;
  border-radius: 16px;
  background: var(--card);
  box-shadow: 0 4px 12px var(--shadow);
  cursor: pointer;
  transition: transform 0.2s;
}
.category-card:active { transform: scale(0.94); }
.category-emoji { font-size: 42px; }
.category-name { font-size: 16px; font-weight: 600; margin-top: 6px; }
.category-progress { font-size: 12px; color: #999; margin-top: 4px; }

/* === Learning (Flashcard) Screen === */
#screen-learn {
  gap: 15px;
  justify-content: flex-start;
  padding-top: 20px;
}

.learn-category-title {
  font-size: 22px;
  font-weight: 700;
  color: #555;
}

.flashcard {
  width: 90%;
  max-width: 450px;
  min-height: 320px;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: 0 8px 30px var(--shadow);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px;
  gap: 10px;
  position: relative;
  transition: transform 0.3s;
}

.flashcard-emoji { font-size: 100px; }
.flashcard-word {
  font-size: 44px;
  font-weight: 800;
  color: #2c3e50;
  letter-spacing: 2px;
}
.flashcard-hebrew {
  font-size: 24px;
  color: #888;
}

.flashcard-nav {
  display: flex;
  gap: 20px;
  align-items: center;
  margin-top: 10px;
}

.btn-nav {
  font-size: 36px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 10px 20px;
  border-radius: 50%;
  transition: background 0.2s;
}
.btn-nav:active { background: rgba(0,0,0,0.05); }

.btn-speak {
  font-size: 44px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 10px;
  transition: transform 0.1s;
}
.btn-speak:active { transform: scale(0.85); }

.flashcard-counter {
  font-size: 16px;
  color: #aaa;
  direction: ltr;
}

.learned-badge {
  position: absolute;
  top: 15px;
  left: 15px;
  font-size: 28px;
}

/* === Game Selection === */
#screen-games {
  gap: 15px;
  padding-top: 20px;
}

.games-grid {
  display: flex;
  flex-direction: column;
  gap: 15px;
  width: 100%;
  max-width: 500px;
}

.game-card {
  padding: 25px 20px;
  border-radius: var(--radius);
  background: var(--card);
  box-shadow: 0 6px 20px var(--shadow);
  cursor: pointer;
  transition: transform 0.2s;
  display: flex;
  align-items: center;
  gap: 15px;
}
.game-card:active { transform: scale(0.96); }
.game-card.locked { opacity: 0.5; pointer-events: none; }

.game-icon { font-size: 50px; }
.game-info { text-align: right; }
.game-title { font-size: 20px; font-weight: 700; }
.game-desc { font-size: 13px; color: #888; margin-top: 4px; }

/* === Emoji Match Game === */
#screen-emoji-match {
  gap: 15px;
  padding-top: 20px;
}

.game-word-display {
  font-size: 44px;
  font-weight: 800;
  color: #2c3e50;
  letter-spacing: 2px;
  margin: 10px 0;
}

.game-score {
  font-size: 18px;
  color: #f39c12;
}

.emoji-options {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 10px;
}

.emoji-option {
  font-size: 60px;
  background: var(--card);
  border: 4px solid #e0e0e0;
  border-radius: 20px;
  padding: 20px 25px;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
}
.emoji-option:active { transform: scale(0.9); }
.emoji-option.correct-pop {
  border-color: var(--correct);
  animation: correctPop 0.5s ease;
}
.emoji-option.wrong-shake {
  border-color: var(--wrong);
  animation: wrongShake 0.4s ease;
}

.game-feedback {
  font-size: 26px;
  font-weight: 700;
  min-height: 40px;
}
.game-feedback.correct { color: var(--correct); }
.game-feedback.wrong { color: var(--wrong); }

/* === Spelling Game === */
#screen-spelling {
  gap: 15px;
  padding-top: 20px;
}

.spelling-hint { font-size: 70px; margin: 5px 0; }

.spelling-slots {
  display: flex;
  gap: 8px;
  justify-content: center;
  direction: ltr;
  margin: 10px 0;
}

.spell-slot {
  width: 50px;
  height: 60px;
  border: 3px dashed #ccc;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 700;
  color: #333;
  text-transform: uppercase;
  background: #fafafa;
}
.spell-slot.filled { border-style: solid; border-color: var(--accent); background: #fff; }

.letter-choices {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  direction: ltr;
}

.letter-btn {
  width: 55px;
  height: 55px;
  font-size: 26px;
  font-weight: 700;
  text-transform: uppercase;
  background: var(--card);
  border: 3px solid #ddd;
  border-radius: 14px;
  cursor: pointer;
  transition: transform 0.1s;
}
.letter-btn:active { transform: scale(0.9); }
.letter-btn.used { opacity: 0.3; pointer-events: none; }

.btn-undo {
  font-size: 20px;
  padding: 10px 24px;
  border-radius: 14px;
  border: 2px solid #ccc;
  background: #fff;
  cursor: pointer;
  margin-top: 5px;
}

/* === Memory Game === */
#screen-memory {
  gap: 10px;
  padding-top: 20px;
}

.memory-grid {
  display: grid;
  gap: 10px;
  width: 100%;
  max-width: 500px;
  padding: 10px;
}
.memory-grid.grid-4 { grid-template-columns: repeat(4, 1fr); }
.memory-grid.grid-3 { grid-template-columns: repeat(3, 1fr); }

.memory-card {
  aspect-ratio: 1;
  border-radius: 14px;
  background: var(--card);
  box-shadow: 0 4px 12px var(--shadow);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  font-weight: 700;
  transition: transform 0.3s;
  position: relative;
  overflow: hidden;
}
.memory-card .card-back {
  font-size: 36px;
  position: absolute;
  transition: opacity 0.3s;
}
.memory-card .card-front {
  position: absolute;
  opacity: 0;
  transition: opacity 0.3s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.memory-card .card-front .mem-emoji { font-size: 32px; }
.memory-card .card-front .mem-text { font-size: 14px; font-weight: 700; color: #333; }

.memory-card.flipped .card-back { opacity: 0; }
.memory-card.flipped .card-front { opacity: 1; }
.memory-card.matched {
  border: 3px solid var(--correct);
  opacity: 0.7;
  pointer-events: none;
}
.memory-card:active { transform: scale(0.94); }

/* === Badges Screen === */
.badges-container {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
  max-width: 500px;
  margin-top: 15px;
}

.badge {
  font-size: 50px;
  padding: 10px;
  opacity: 0.2;
}
.badge.earned { opacity: 1; animation: badgePop 0.5s ease; }

/* === Common Buttons === */
.btn-primary {
  padding: 14px 40px;
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  background: var(--gradient);
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: transform 0.15s;
  box-shadow: 0 4px 15px var(--shadow);
}
.btn-primary:active { transform: scale(0.95); }

.btn-secondary {
  padding: 10px 24px;
  font-size: 16px;
  font-weight: 600;
  color: #666;
  background: var(--card);
  border: 2px solid #ddd;
  border-radius: 14px;
  cursor: pointer;
}

.section-title {
  font-size: 24px;
  font-weight: 700;
  color: #444;
}

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 600px;
  padding: 0 10px;
}

.top-bar-title {
  font-size: 20px;
  font-weight: 700;
  color: #555;
}

/* === Animations === */
@keyframes correctPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
@keyframes badgePop {
  0% { transform: scale(0); }
  60% { transform: scale(1.3); }
  100% { transform: scale(1); }
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.bounce { animation: bounce 0.6s ease; }

/* === iPad Responsive === */
@media (min-width: 768px) {
  .flashcard { min-height: 380px; }
  .flashcard-emoji { font-size: 120px; }
  .flashcard-word { font-size: 52px; }
  .profile-card { width: 300px; padding: 40px 30px; }
  .emoji-option { font-size: 70px; padding: 25px 30px; }
  .categories-grid { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 400px) {
  .profiles-container { flex-direction: column; align-items: center; }
  .mode-cards { flex-direction: column; align-items: center; }
  .emoji-option { font-size: 44px; padding: 15px; }
}
    </style>
</head>
<body>
    <div id="screen-profiles" class="screen active">
        <div class="app-title">🌟 משחק האנגלית 🌟</div>
        <div class="app-subtitle">!מי משחק היום</div>
        <div class="profiles-container">
            <div class="profile-card alon-card" onclick="selectProfile('alon')">
                <div class="profile-emoji">🚀</div>
                <div class="profile-name">אלון - Alon</div>
                <div class="profile-stars" id="alon-stars">⭐ 0</div>
            </div>
            <div class="profile-card romi-card" onclick="selectProfile('romi')">
                <div class="profile-emoji">🦄</div>
                <div class="profile-name">רומי - Romi</div>
                <div class="profile-stars" id="romi-stars">⭐ 0</div>
            </div>
        </div>
    </div>
    <div id="screen-home" class="screen">
        <div class="home-header">
            <div class="home-profile-info">
                <div class="home-avatar" id="home-avatar">🚀</div>
                <div>
                    <div class="home-name" id="home-name">אלון</div>
                    <div class="home-stars-count" id="home-stars">⭐ 0</div>
                </div>
            </div>
            <button class="btn-back" onclick="showScreen('screen-profiles')">🏠</button>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="home-progress-bar" style="width: 0%"></div>
        </div>
        <div class="progress-text" id="home-progress-text">0% מילים נלמדו</div>
        <div class="mode-cards">
            <div class="mode-card" onclick="startLearning()">
                <div class="mode-icon">📚</div>
                <div class="mode-title">לימוד</div>
                <div class="mode-desc">למד מילים חדשות באנגלית</div>
            </div>
            <div class="mode-card" onclick="startPlaying()">
                <div class="mode-icon">🎮</div>
                <div class="mode-title">משחק</div>
                <div class="mode-desc">תרגל עם משחקים כיפיים</div>
            </div>
        </div>
        <div class="badges-container" id="home-badges"></div>
    </div>
    <div id="screen-categories" class="screen">
        <div class="top-bar">
            <div class="top-bar-title">📚 בחר קטגוריה</div>
            <button class="btn-back" onclick="showScreen('screen-home')">🏠</button>
        </div>
        <div class="categories-grid" id="categories-grid"></div>
    </div>
    <div id="screen-learn" class="screen">
        <div class="top-bar">
            <div class="learn-category-title" id="learn-category-title"></div>
            <div><button class="btn-back" onclick="showScreen('screen-categories')">🔙</button><button class="btn-back" onclick="showScreen('screen-home')">🏠</button></div>
        </div>
        <div class="flashcard" id="flashcard">
            <div class="learned-badge" id="learned-badge" style="display:none">⭐</div>
            <div class="flashcard-emoji" id="flashcard-emoji"></div>
            <div class="flashcard-word" id="flashcard-word"></div>
            <div class="flashcard-hebrew" id="flashcard-hebrew"></div>
        </div>
        <button class="btn-speak" onclick="speakCurrent()">🔊</button>
        <div class="flashcard-nav">
            <button class="btn-nav" onclick="prevCard()">▶</button>
            <div class="flashcard-counter" id="flashcard-counter"></div>
            <button class="btn-nav" onclick="nextCard()">◀</button>
        </div>
    </div>
    <div id="screen-games" class="screen">
        <div class="top-bar">
            <div class="top-bar-title">🎮 בחר משחק</div>
            <button class="btn-back" onclick="showScreen('screen-home')">🏠</button>
        </div>
        <div class="games-grid" id="games-grid"></div>
    </div>
    <div id="screen-emoji-match" class="screen">
        <div class="top-bar">
            <div class="game-score" id="emoji-score">⭐ 0</div>
            <div><button class="btn-back" onclick="showScreen('screen-games')">🔙</button><button class="btn-back" onclick="showScreen('screen-home')">🏠</button></div>
        </div>
        <button class="btn-speak" onclick="speakGameWord()">🔊</button>
        <div class="game-word-display" id="emoji-word"></div>
        <div class="emoji-options" id="emoji-options"></div>
        <div class="game-feedback" id="emoji-feedback"></div>
        <div class="flashcard-counter" id="emoji-round"></div>
    </div>
    <div id="screen-spelling" class="screen">
        <div class="top-bar">
            <div class="game-score" id="spelling-score">⭐ 0</div>
            <div><button class="btn-back" onclick="showScreen('screen-games')">🔙</button><button class="btn-back" onclick="showScreen('screen-home')">🏠</button></div>
        </div>
        <div class="spelling-hint" id="spelling-hint"></div>
        <button class="btn-speak" onclick="speakSpellingWord()">🔊</button>
        <div class="spelling-slots" id="spelling-slots"></div>
        <div class="letter-choices" id="letter-choices"></div>
        <button class="btn-undo" onclick="undoLetter()">מחק ⌫</button>
        <div class="game-feedback" id="spelling-feedback"></div>
        <div class="flashcard-counter" id="spelling-round"></div>
    </div>
    <div id="screen-memory" class="screen">
        <div class="top-bar">
            <div class="game-score" id="memory-score">ניסיונות: 0</div>
            <div><button class="btn-back" onclick="showScreen('screen-games')">🔙</button><button class="btn-back" onclick="showScreen('screen-home')">🏠</button></div>
        </div>
        <div class="memory-grid" id="memory-grid"></div>
        <div class="game-feedback" id="memory-feedback"></div>
    </div>
    <script>
// ===== VOCABULARY DATA =====
const WORDS = {
  animals: [
    {word:'Dog',hebrew:'כלב',emoji:'🐶'},{word:'Cat',hebrew:'חתול',emoji:'🐱'},
    {word:'Bird',hebrew:'ציפור',emoji:'🐦'},{word:'Fish',hebrew:'דג',emoji:'🐟'},
    {word:'Horse',hebrew:'סוס',emoji:'🐴'},{word:'Cow',hebrew:'פרה',emoji:'🐄'},
    {word:'Rabbit',hebrew:'ארנב',emoji:'🐰'},{word:'Bear',hebrew:'דוב',emoji:'🐻'},
    {word:'Lion',hebrew:'אריה',emoji:'🦁'},{word:'Monkey',hebrew:'קוף',emoji:'🐵'},
    {word:'Elephant',hebrew:'פיל',emoji:'🐘'}
  ],
  food: [
    {word:'Apple',hebrew:'תפוח',emoji:'🍎'},{word:'Banana',hebrew:'בננה',emoji:'🍌'},
    {word:'Bread',hebrew:'לחם',emoji:'🍞'},{word:'Water',hebrew:'מים',emoji:'💧'},
    {word:'Milk',hebrew:'חלב',emoji:'🥛'},{word:'Egg',hebrew:'ביצה',emoji:'🥚'},
    {word:'Rice',hebrew:'אורז',emoji:'🍚'},{word:'Cake',hebrew:'עוגה',emoji:'🎂'},
    {word:'Pizza',hebrew:'פיצה',emoji:'🍕'},{word:'Ice Cream',hebrew:'גלידה',emoji:'🍦'}

// ===== HELPERS =====
function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
function getAllWords() { const r=[]; for(const c in WORDS) WORDS[c].forEach((w,i)=>r.push({...w,cat:c,idx:i})); return r; }
const audioCache = {};

function speak(text) {
  // Use speechSynthesis directly — reliable for all words,
  // no unwanted articles ("a bus"), and handles multi-word entries ("Ice Cream").
  speakFallback(text);
}

function speakFallback(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.8;
  const voices = window.speechSynthesis.getVoices();
  const goodVoice = voices.find(v => v.name.includes('Google') && v.lang.startsWith('en')) || 
                    voices.find(v => v.name.includes('Samantha') && v.lang.startsWith('en')) ||
                    voices.find(v => v.lang.startsWith('en'));
  if (goodVoice) u.voice = goodVoice;
  window.speechSynthesis.speak(u);
}

// ===== PERSISTENCE =====
function getProgress() {
  const key = `kids_english_${state.profile}`;
  const saved = localStorage.getItem(key);
  if(saved) return JSON.parse(saved);
  return { learned:{}, stars:0, badges:[], gamesPlayed:0, perfectGames:0 };
}
function saveProgress(data) { localStorage.setItem(`kids_english_${state.profile}`, JSON.stringify(data)); }
function addStars(n) {
  const p=getProgress(); p.stars+=n; saveProgress(p); updateStarsDisplay(p.stars);
}
function markWordLearned(cat, idx) {
  const p=getProgress();
  if(!p.learned[cat]) p.learned[cat]=[];
  if(!p.learned[cat].includes(idx)){ p.learned[cat].push(idx); p.stars++; saveProgress(p); checkBadges(); }
}
function getTotalLearned() {
  const p=getProgress(); let t=0;
  for(const c in p.learned) t+=p.learned[c].length;
  return t;
}
function getTotalWords() { let t=0; for(const c in WORDS) t+=WORDS[c].length; return t; }
function isWordLearned(cat, idx) { const p=getProgress(); return p.learned[cat] && p.learned[cat].includes(idx); }
function checkBadges() {
  const p=getProgress(); p.totalLearned=getTotalLearned();
  let newBadge=false;
  BADGES.forEach(b=>{ if(!p.badges.includes(b.id) && b.threshold(p)){ p.badges.push(b.id); newBadge=true; }});
  if(newBadge) saveProgress(p);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active'); s.style.display='none';});
  const el=document.getElementById(id);
  if(el){ el.classList.add('active'); el.style.display='flex'; }
  // Trigger screen-specific setup
  if(id==='screen-home') setupHome();
  if(id==='screen-categories') setupCategories();
  if(id==='screen-games') setupGames();
  if(id==='screen-profiles') setupProfiles();
  // Clear learn timer
  if(id!=='screen-learn' && learnState.timer){ clearTimeout(learnState.timer); learnState.timer=null; }
}

function updateStarsDisplay(stars) {
  document.getElementById('home-stars').textContent = `⭐ ${stars}`;

  if(profileStarEl) profileStarEl.textContent = `⭐ ${stars}`;

function openCategory(catId) {

  document.getElementById('learn-category-title').textContent=`${cat.emoji} ${cat.name}`;

  showFlashcard();

function showFlashcard() {
  const words=WORDS[learnState.category];
  const w=words[learnState.index];
  document.getElementById('flashcard-emoji').textContent=w.emoji;
  document.getElementById('flashcard-word').textContent=w.word;
  document.getElementById('flashcard-hebrew').textContent=w.hebrew;
  document.getElementById('flashcard-counter').textContent=`${learnState.index+1} / ${words.length}`;
  const badge=document.getElementById('learned-badge');
  badge.style.display=isWordLearned(learnState.category,learnState.index)?'block':'none';
  // Auto-speak
  setTimeout(()=>speak(w.word), 400);
  // Mark learned after 2 seconds
  if(learnState.timer) clearTimeout(learnState.timer);
  learnState.timer=setTimeout(()=>{
    markWordLearned(learnState.category, learnState.index);
    document.getElementById('learned-badge').style.display='block';
  }, 2000);
}
function speakCurrent() { speak(WORDS[learnState.category][learnState.index].word); }
function nextCard() {
  const words=WORDS[learnState.category];
  learnState.index=(learnState.index+1)%words.length;
  showFlashcard();
}
function prevCard() {
  const words=WORDS[learnState.category];
  learnState.index=(learnState.index-1+words.length)%words.length;
  showFlashcard();
}

// ===== EMOJI MATCH GAME =====
function initEmojiMatch() {
  const all=getAllWords();
  emojiGame={words:shuffle(all).slice(0, 10), round:0, score:0, total:10, correct:0};
  showScreen('screen-emoji-match');
  showEmojiRound();
}
function showEmojiRound() {
  if(emojiGame.round>=emojiGame.total){ endEmojiMatch(); return; }
  const w=emojiGame.words[emojiGame.round];
  document.getElementById('emoji-word').textContent=w.word;
  document.getElementById('emoji-score').textContent=`⭐ ${emojiGame.score}`;
  document.getElementById('emoji-round').textContent=`${emojiGame.round+1} / ${emojiGame.total}`;
  document.getElementById('emoji-feedback').textContent='';
  document.getElementById('emoji-feedback').className='game-feedback';
  // Get wrong options
  const all=getAllWords().filter(x=>x.word!==w.word);
  const wrongs=shuffle(all).slice(0,3);
  const opts=shuffle([w,...wrongs]);
  const container=document.getElementById('emoji-options'); container.innerHTML='';
  opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='emoji-option';
    btn.textContent=o.emoji;
    btn.onclick=()=>checkEmojiAnswer(btn, o.word===w.word);
    container.appendChild(btn);
  });
  setTimeout(()=>speak(w.word),300);
}
function speakGameWord() { speak(emojiGame.words[emojiGame.round]?.word||''); }
function checkEmojiAnswer(btn, correct) {
  const fb=document.getElementById('emoji-feedback');
  if(correct){
    btn.classList.add('correct-pop');
    fb.textContent='כל הכבוד! 🎉';
    fb.className='game-feedback correct';
    emojiGame.score+=2; emojiGame.correct++;
    document.getElementById('emoji-score').textContent=`⭐ ${emojiGame.score}`;
    if(window.confetti) confetti({particleCount:80,spread:60,origin:{y:0.7}});
    document.querySelectorAll('.emoji-option').forEach(b=>b.onclick=null);
    setTimeout(()=>{emojiGame.round++;showEmojiRound();},1500);
  } else {
    btn.classList.add('wrong-shake');
    fb.textContent='נסה שוב! 😊';
    fb.className='game-feedback wrong';
    setTimeout(()=>btn.classList.remove('wrong-shake'),400);
  }
}
function endEmojiMatch() {
  const p=getProgress();
  p.gamesPlayed++; addStars(emojiGame.score);
  if(emojiGame.correct===emojiGame.total){ p.perfectGames++; }
  saveProgress(p); checkBadges();
  const fb=document.getElementById('emoji-feedback');
  fb.textContent=`!סיימת! ${emojiGame.score} כוכבים ⭐`;
  fb.className='game-feedback correct';
  document.getElementById('emoji-word').textContent='🎊';
  document.getElementById('emoji-options').innerHTML=`<button class="btn-primary" onclick="showScreen('screen-games')">חזור למשחקים</button>`;
  document.getElementById('emoji-round').textContent='';
  if(window.confetti) confetti({particleCount:150,spread:100,origin:{y:0.6}});
}

// ===== SPELLING GAME =====
function initSpelling() {
  const learned=[];
  const p=getProgress();
  for(const cat in p.learned){
    p.learned[cat].forEach(idx=>{ if(WORDS[cat][idx]) learned.push(WORDS[cat][idx]); });
  }
  if(learned.length<3){ learned.push(...getAllWords().slice(0,5)); }
  let pool = learned;
  spellingGame={words:shuffle(pool).slice(0,8), round:0, score:0, total:Math.min(8,pool.length), filled:[], current:null};
  showScreen('screen-spelling');
  showSpellingRound();
}
function showSpellingRound() {
  if(spellingGame.round>=spellingGame.total){ endSpelling(); return; }
  const w=spellingGame.words[spellingGame.round];
  spellingGame.current=w; spellingGame.filled=[];
  document.getElementById('spelling-hint').textContent=w.emoji;
  document.getElementById('spelling-score').textContent=`⭐ ${spellingGame.score}`;
  document.getElementById('spelling-round').textContent=`${spellingGame.round+1} / ${spellingGame.total}`;
  document.getElementById('spelling-feedback').textContent='';
  document.getElementById('spelling-feedback').className='game-feedback';
  setTimeout(()=>speak(w.word),300);

  // Both kids get the easy "pick first letter" mode
  setupEasySpelling(w);
}
function setupEasySpelling(w) {
  // Show the word, ask to pick the first letter
  const slots=document.getElementById('spelling-slots');
  slots.innerHTML=`<div style="font-size:32px;font-weight:700;direction:ltr;letter-spacing:4px">${w.word}</div>`;
  document.querySelector('.btn-undo').style.display='none';
  const first=w.word[0].toUpperCase();
  const letters=[first];
  const alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  while(letters.length<4){ const r=alpha[Math.floor(Math.random()*26)]; if(!letters.includes(r)) letters.push(r); }
  const choices=document.getElementById('letter-choices'); choices.innerHTML='';
  shuffle(letters).forEach(l=>{
    const btn=document.createElement('button');
    btn.className='letter-btn'; btn.textContent=l;
    btn.onclick=()=>{
      if(l===first){
        btn.style.borderColor='var(--correct)'; btn.style.background='#e8f5e9';
        spellingGame.score+=2;
        document.getElementById('spelling-feedback').textContent='נכון! 🎉';
        document.getElementById('spelling-feedback').className='game-feedback correct';
        if(window.confetti) confetti({particleCount:50,spread:40,origin:{y:0.7}});
        choices.querySelectorAll('.letter-btn').forEach(b=>b.onclick=null);
        setTimeout(()=>{spellingGame.round++;showSpellingRound();},1500);
      } else {
        btn.classList.add('wrong-shake');
        document.getElementById('spelling-feedback').textContent='נסה שוב! 😊';
        document.getElementById('spelling-feedback').className='game-feedback wrong';
        setTimeout(()=>btn.classList.remove('wrong-shake'),400);
      }
    };
    choices.appendChild(btn);
  });
}
function undoLetter() { /* no longer needed but kept for compat */ }
function speakSpellingWord() { speak(spellingGame.current?.word||''); }
function endSpelling() {
  const p=getProgress(); p.gamesPlayed++; addStars(spellingGame.score); saveProgress(p); checkBadges();
  document.getElementById('spelling-hint').textContent='🎊';
  document.getElementById('spelling-feedback').textContent=`!סיימת! ${spellingGame.score} כוכבים ⭐`;
  document.getElementById('spelling-feedback').className='game-feedback correct';
  document.getElementById('spelling-slots').innerHTML=`<button class="btn-primary" onclick="showScreen('screen-games')">חזור למשחקים</button>`;
  document.getElementById('letter-choices').innerHTML='';
  document.querySelector('.btn-undo').style.display='none';
  if(window.confetti) confetti({particleCount:150,spread:100,origin:{y:0.6}});
}

// ===== MEMORY GAME =====
function initMemory() {
  const pairs = 6;
  const learned=[]; const p=getProgress();
  for(const cat in p.learned) p.learned[cat].forEach(idx=>{if(WORDS[cat][idx]) learned.push(WORDS[cat][idx]);});
  if(learned.length<pairs){ const all=getAllWords(); while(learned.length<pairs) learned.push(all[learned.length]); }
  const selected=shuffle(learned).slice(0,pairs);
  const cards=[];
  selected.forEach((w,i)=>{
    cards.push({id:i,type:'emoji',content:w.emoji,word:w.word,pairId:i});
    cards.push({id:i,type:'word',content:w.word,pairId:i});
  });
  memoryGame={cards:shuffle(cards),flipped:[],matched:0,attempts:0,busy:false,pairs:pairs};
  showScreen('screen-memory');
  const grid=document.getElementById('memory-grid');
  grid.className = 'memory-grid ' + (pairs<=4?'grid-3':'grid-4');
  grid.innerHTML='';
  memoryGame.cards.forEach((c,i)=>{
    const card=document.createElement('div');
    card.className='memory-card'; card.dataset.index=i;
    card.innerHTML=`<div class="card-back">❓</div><div class="card-front">${c.type==='emoji'?`<span class="mem-emoji">${c.content}</span>`:`<span class="mem-text">${c.content}</span>`}</div>`;
    card.onclick=()=>flipCard(i);
    grid.appendChild(card);
  });
  document.getElementById('memory-score').textContent='ניסיונות: 0';
  document.getElementById('memory-feedback').textContent='';
}
function flipCard(idx) {
  if(memoryGame.busy) return;
  const cards=document.querySelectorAll('.memory-card');
  const card=cards[idx];
  if(card.classList.contains('flipped')||card.classList.contains('matched')) return;
  card.classList.add('flipped');
  const data=memoryGame.cards[idx];
  if(data.type==='word') speak(data.content);
  memoryGame.flipped.push(idx);
  if(memoryGame.flipped.length===2){
    memoryGame.busy=true; memoryGame.attempts++;
    document.getElementById('memory-score').textContent=`ניסיונות: ${memoryGame.attempts}`;
    const [a,b]=memoryGame.flipped;
    const da=memoryGame.cards[a], db=memoryGame.cards[b];
    if(da.pairId===db.pairId){
      setTimeout(()=>{
        cards[a].classList.add('matched'); cards[b].classList.add('matched');
        memoryGame.matched++; memoryGame.flipped=[]; memoryGame.busy=false;
        if(memoryGame.matched===memoryGame.pairs) endMemory();
      },500);
    } else {
      setTimeout(()=>{
        cards[a].classList.remove('flipped'); cards[b].classList.remove('flipped');
        memoryGame.flipped=[]; memoryGame.busy=false;
      },1000);
    }
  }
}
function endMemory() {
  const stars=Math.max(2, 6-Math.floor(memoryGame.attempts/memoryGame.pairs));
  const p=getProgress(); p.gamesPlayed++; addStars(stars);
  if(memoryGame.attempts<=memoryGame.pairs+2) p.perfectGames++;
  saveProgress(p); checkBadges();
  const fb=document.getElementById('memory-feedback');
  fb.textContent=`כל הכבוד! ${stars} כוכבים ⭐`;
  fb.className='game-feedback correct';
  if(window.confetti) confetti({particleCount:150,spread:100,origin:{y:0.6}});
  setTimeout(()=>{
    document.getElementById('memory-grid').innerHTML=`<button class="btn-primary" onclick="showScreen('screen-games')">חזור למשחקים</button>`;
  },2000);
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', ()=>{
  showScreen('screen-profiles');
});
